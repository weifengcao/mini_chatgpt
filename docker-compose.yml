services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mini_chatgpt
      POSTGRES_PASSWORD: mini_chatgpt
      POSTGRES_DB: mini_chatgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
